name: Secrets Scan

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          VERSION="8.23.3"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tgz
          tar -xzf gitleaks.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          BASE_ARGS=(git --report-format sarif --report-path gitleaks.sarif --redact --exit-code 1)

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
            if [ -f ".github/security/gitleaks-baseline.json" ]; then
              gitleaks "${BASE_ARGS[@]}" --log-opts "$RANGE" --baseline-path .github/security/gitleaks-baseline.json
            else
              gitleaks "${BASE_ARGS[@]}" --log-opts "$RANGE"
            fi
          else
            if [ -f ".github/security/gitleaks-baseline.json" ]; then
              gitleaks "${BASE_ARGS[@]}" --baseline-path .github/security/gitleaks-baseline.json
            else
              gitleaks "${BASE_ARGS[@]}"
            fi
          fi

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
