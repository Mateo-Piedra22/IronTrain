name: Promote Android Build to Staging

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[promote]') }}
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    environment: staging
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
      IOS_GOOGLE_SERVICES_INFO_PLIST_BASE64: ${{ secrets.IOS_GOOGLE_SERVICES_INFO_PLIST_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Preflight tests
        run: npm test -- --watch=false

      - name: TypeScript check (mobile)
        run: npx tsc --noEmit

      - name: Restore Firebase Secrets
        run: node scripts/recreate-secrets.js

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (EAS preview APK)
        run: eas build --platform android --profile preview --non-interactive --wait --json > eas-build.json

      - name: Extract artifact URL
        id: artifact
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const raw = fs.readFileSync('eas-build.json', 'utf8').trim();
          let data;
          try { data = JSON.parse(raw); } catch { console.error('Failed to parse eas-build.json'); process.exit(1); }
          const search = (value) => {
            if (typeof value === 'string') return value.includes('.apk') ? value : null;
            if (!value || typeof value !== 'object') return null;
            if (Array.isArray(value)) { for (const v of value) { const found = search(v); if (found) return found; } return null; }
            for (const k of Object.keys(value)) { const found = search(value[k]); if (found) return found; }
            return null;
          };
          const apkUrl = search(data);
          if (!apkUrl) { console.error('No APK URL found in EAS JSON output'); process.exit(1); }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `apk_url=${apkUrl}\n`);
          NODE

      - name: Download APK
        shell: bash
        run: |
          ref_name=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')
          apk="IronTrain-${ref_name}.apk"
          curl -L "${{ steps.artifact.outputs.apk_url }}" -o "${apk}"
          sha256sum "${apk}" | awk '{print $1}' > "${apk}.sha256.txt"

      - name: Generate build metadata
        shell: bash
        run: |
          ref_name=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')
          apk="IronTrain-${ref_name}.apk"
          checksum_file="${apk}.sha256.txt"
          checksum="$(cat "$checksum_file")"
          now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > "build-metadata-${ref_name}.json" <<JSON
          {
            "application": "IronTrain",
            "platform": "android",
            "ref": "${ref_name}",
            "git": {
              "sha": "${GITHUB_SHA}",
              "ref": "${GITHUB_REF}",
              "run_id": "${GITHUB_RUN_ID}",
              "run_attempt": "${GITHUB_RUN_ATTEMPT}",
              "repository": "${GITHUB_REPOSITORY}"
            },
            "build": {
              "created_at_utc": "${now}",
              "runner": "${RUNNER_NAME}",
              "runner_os": "${RUNNER_OS}",
              "runner_arch": "${RUNNER_ARCH}"
            },
            "artifact": {
              "name": "${apk}",
              "sha256": "${checksum}"
            }
          }
          JSON

      - name: Upload build package artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.ref_name }}
          if-no-files-found: error
          retention-days: 30
          path: |
            IronTrain-${{ github.ref_name }}.apk
            IronTrain-${{ github.ref_name }}.apk.sha256.txt
            build-metadata-${{ github.ref_name }}.json
