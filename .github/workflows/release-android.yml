name: Release Android Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    if: "!contains(github.event.head_commit.message, '[skip eas]')"
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
      IOS_GOOGLE_SERVICES_INFO_PLIST_BASE64: ${{ secrets.IOS_GOOGLE_SERVICES_INFO_PLIST_BASE64 }}
    steps:
      - name: Validate tag format
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must follow semantic version format: vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Check EXPO_TOKEN
        shell: bash
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "Missing EXPO_TOKEN GitHub secret."
            echo "Create it in: Expo dashboard -> Settings -> Access Tokens, then add it in:"
            echo "GitHub repo -> Settings -> Secrets and variables -> Actions -> New repository secret (EXPO_TOKEN)."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Preflight tests
        run: npm test -- --watch=false

      - name: TypeScript check (mobile)
        run: npx tsc --noEmit

      - name: Restore Firebase Secrets
        run: node scripts/recreate-secrets.js

      - name: Generate changelog JSON
        run: npm run generate-changelog

      - name: Extract release body from changelog
        id: changelog
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const json = JSON.parse(fs.readFileSync('src/changelog.generated.json', 'utf8'));
          const version = process.env.GITHUB_REF_NAME.replace(/^v/, '');

          const release = json.releases.find(r => r.version === version);
          if (!release) {
            console.error(`Version ${version} not found in changelog`);
            process.exit(1);
          }

          const body = [
            `## What's New (${release.version})`,
            release.date ? `*Released: ${release.date}*` : '',
            '',
            ...release.items.map(item => `- ${item}`)
          ].filter(Boolean).join('\n');

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `body=${JSON.stringify(body)}\n`);
          NODE

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (EAS preview APK)
        run: eas build --platform android --profile preview --non-interactive --wait --json > eas-build.json

      - name: Extract artifact URL
        id: artifact
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const raw = fs.readFileSync('eas-build.json', 'utf8').trim();
          let data;
          try {
            data = JSON.parse(raw);
          } catch {
            console.error('Failed to parse eas-build.json');
            process.exit(1);
          }
          const search = (value) => {
            if (typeof value === 'string') return value.includes('.apk') ? value : null;
            if (!value || typeof value !== 'object') return null;
            if (Array.isArray(value)) {
              for (const v of value) {
                const found = search(v);
                if (found) return found;
              }
              return null;
            }
            for (const k of Object.keys(value)) {
              const found = search(value[k]);
              if (found) return found;
            }
            return null;
          };
          const apkUrl = search(data);
          if (!apkUrl) {
            console.error('No APK URL found in EAS JSON output');
            process.exit(1);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `apk_url=${apkUrl}\n`);
          NODE

      - name: Download APK
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          apk="IronTrain-${tag}.apk"
          curl -L "${{ steps.artifact.outputs.apk_url }}" -o "${apk}"
          sha256sum "${apk}" | awk '{print $1}' > "IronTrain-${tag}.sha256.txt"

      - name: Generate build metadata
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          apk="IronTrain-${tag}.apk"
          checksum_file="IronTrain-${tag}.sha256.txt"
          checksum="$(cat "$checksum_file")"
          now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > "build-metadata-${tag}.json" <<JSON
          {
            "application": "IronTrain",
            "platform": "android",
            "tag": "${tag}",
            "version": "${tag#v}",
            "git": {
              "sha": "${GITHUB_SHA}",
              "ref": "${GITHUB_REF}",
              "run_id": "${GITHUB_RUN_ID}",
              "run_attempt": "${GITHUB_RUN_ATTEMPT}",
              "repository": "${GITHUB_REPOSITORY}"
            },
            "build": {
              "created_at_utc": "${now}",
              "runner": "${RUNNER_NAME}",
              "runner_os": "${RUNNER_OS}",
              "runner_arch": "${RUNNER_ARCH}"
            },
            "artifact": {
              "name": "${apk}",
              "sha256": "${checksum}"
            }
          }
          JSON

      - name: Upload build package artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.ref_name }}
          if-no-files-found: error
          retention-days: 30
          path: |
            IronTrain-${{ github.ref_name }}.apk
            IronTrain-${{ github.ref_name }}.sha256.txt
            build-metadata-${{ github.ref_name }}.json

      - name: Create draft prerelease and upload assets
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          draft: true
          prerelease: true
          body: ${{ steps.changelog.outputs.body }}
          files: |
            IronTrain-${{ github.ref_name }}.apk
            IronTrain-${{ github.ref_name }}.sha256.txt
            build-metadata-${{ github.ref_name }}.json
