name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile-quality:
    name: Mobile Quality Checks
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check (mobile)
        run: npx tsc --noEmit

      - name: Unit tests (mobile)
        run: npm test -- --watch=false

  web-quality:
    name: Web Build Checks
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./website

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies (web)
        run: npm ci

      - name: TypeScript check (web)
        run: npx tsc --noEmit

      - name: Build website
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
