name: PR Governance

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-governance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: PR Title (Conventional)
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title follows Conventional Commits
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title || '';
            const conventional = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?!?:\s.{1,}$/i;
            if (!conventional.test(title)) {
              core.setFailed(
                `PR title is not conventional: "${title}". Expected: type(scope): description`
              );
            }

  pr-size:
    name: PR Size Guard
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - name: Enforce PR size thresholds
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = context.payload.pull_request.changed_files || 0;
            const additions = context.payload.pull_request.additions || 0;
            const deletions = context.payload.pull_request.deletions || 0;
            const totalChanges = additions + deletions;

            core.info(`Changed files: ${changedFiles}, total line changes: ${totalChanges}`);

            if (changedFiles > 80 || totalChanges > 2500) {
              core.setFailed(
                `PR too large (${changedFiles} files, ${totalChanges} line changes). Split into smaller PRs.`
              );
              return;
            }

            if (changedFiles > 40 || totalChanges > 1200) {
              core.warning(
                `Large PR detected (${changedFiles} files, ${totalChanges} line changes). Consider reducing size.`
              );
            }

  pr-commit-convention:
    name: PR Commit Convention
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Validate commit subjects
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number, per_page: 100 }
            );

            const conventional = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?!?:\s.{1,}$/i;
            const allowedNonConventional = [/^Merge /, /^Revert /, /^Initial commit$/i];

            const invalid = [];
            for (const commit of commits) {
              const subject = (commit.commit.message || '').split('\n')[0].trim();
              const isAllowedException = allowedNonConventional.some((pattern) => pattern.test(subject));
              if (!subject || (!conventional.test(subject) && !isAllowedException)) {
                invalid.push(`${commit.sha.slice(0, 7)}: ${subject || '<empty subject>'}`);
              }
            }

            if (invalid.length > 0) {
              core.setFailed(
                `Found non-conventional commit subjects:\n${invalid.join('\n')}`
              );
            }

  pr-auto-labeler:
    name: PR Auto Labeler
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Apply labels by changed paths
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
