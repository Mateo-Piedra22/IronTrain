name: Repo Hygiene

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  issues:
    types: [opened, reopened, edited]
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      run_stale:
        description: "Run stale maintenance"
        required: false
        default: "true"

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: repo-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-path-labels:
    name: Repo Hygiene - PR Path Labels
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Apply labels by changed paths
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

  issue-triage:
    name: Repo Hygiene - Issue Triage
    if: github.event_name == 'issues'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Apply triage labels to new/edited issues
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) return;

            const current = (issue.labels || []).map((l) => l.name);
            const toAdd = [];

            if (!current.includes('triage')) toAdd.push('triage');
            if ((!issue.body || issue.body.trim().length < 20) && !current.includes('needs-info')) {
              toAdd.push('needs-info');
            }

            if (toAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: toAdd
              });
            }

  stale-maintenance:
    name: Repo Hygiene - Stale Policy
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_stale == 'true')
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Mark and close stale issues/PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 30
          days-before-issue-close: 10
          days-before-pr-stale: 21
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          close-issue-label: closed-by-bot
          close-pr-label: closed-by-bot
          stale-issue-message: "This issue has been marked as stale due to inactivity. It will be closed if there is no further activity."
          stale-pr-message: "This PR has been marked as stale due to inactivity. It will be closed if there is no further activity."
          exempt-issue-labels: "security,release,pinned"
          exempt-pr-labels: "security,release,pinned"
